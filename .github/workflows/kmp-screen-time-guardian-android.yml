name: Build Screen Time Guardian APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'kmp-screen-time-guardian/**'
      - '.github/workflows/kmp-screen-time-guardian-android.yml'
  pull_request:
    paths:
      - 'kmp-screen-time-guardian/**'
      - '.github/workflows/kmp-screen-time-guardian-android.yml'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: kmp-screen-time-guardian

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper if missing
        run: gradle wrapper --gradle-version 8.10.2

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: screen-time-guardian-debug-apk
          path: kmp-screen-time-guardian/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
